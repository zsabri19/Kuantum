<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 72" fill="none">
  <!-- K Monogram Mark — geometric with quantum circle accent -->
  <g>
    <!-- Outer ring -->
    <circle cx="32" cy="36" r="26" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.35"/>
    <!-- Inner ring -->
    <circle cx="32" cy="36" r="20" fill="none" stroke="#C9A84C" stroke-width="0.75" opacity="0.5"/>
    <!-- K vertical stem -->
    <line x1="22" y1="18" x2="22" y2="54" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
    <!-- K upper arm -->
    <line x1="22" y1="36" x2="44" y2="18" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
    <!-- K lower arm -->
    <line x1="22" y1="36" x2="44" y2="54" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
    <!-- Center node -->
    <circle cx="32" cy="36" r="3.5" fill="#C9A84C"/>
    <!-- Quantum dot accent top-right -->
    <circle cx="50" cy="18" r="2" fill="#C9A84C" opacity="0.6"/>
    <circle cx="50" cy="54" r="2" fill="#C9A84C" opacity="0.6"/>
  </g>
  <!-- KUANTUM Wordmark -->
  <text x="76" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700" fill="#FFFFFF" letter-spacing="6">KUANTUM</text>
  <!-- Tagline -->
  <text x="77" y="52" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#C9A84C" letter-spacing="4.5" font-weight="400">GCC DIGITAL TRADE PLATFORM</text>
  <!-- Divider line -->
  <line x1="76" y1="58" x2="310" y2="58" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
</svg>
